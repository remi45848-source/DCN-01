            height: 100%;

        .s9-scroll-hint {
            position: absolute;
            left: 50%;
            bottom: 18%;
            transform: translateX(-50%);
            z-index: 20;

            flex-direction: column;

            width: 100%;

            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        }
        .s20-title {

        .s20-bars {

            height: 34px;
            margin-bottom: 10px;

        .s20-bars span:nth-child(4) { animation-delay: 0.24s; }
        .s20-bars span:nth-child(5) { animation-delay: 0.32s; }

        @keyframes s20Bars {

        .nav-hint {

            right: 14px;
            bottom: 24px;

            color: rgba(255, 255, 255, 0.35);

        #firstGestureHint {

        #onboardingGuide {

        .onboard-title {

            left: 50%;
            transform: translateX(-50%);

            letter-spacing: 0.18em;
            text-transform: lowercase;
            color: rgba(255,255,255,0.72);
            opacity: 1;

        .onboard-step {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .onboard-step.active { display: flex; }
        #onboardStep1 {
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        #onboardStep2 {
            right: 16px;
            bottom: 20px;
            align-items: flex-end;
        }
        .onboard-hand {
            width: 34px;
            height: 34px;
            display: block;
            color: rgba(255,255,255,0.9);
            filter: drop-shadow(0 0 14px rgba(255,255,255,0.2));
            user-select: none;
        }
        .onboard-hand path {
            fill: none;
            stroke: currentColor;
            stroke-width: 1.9;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .onboard-caption {
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: lowercase;
            color: rgba(255,255,255,0.78);
        }
        .hand-drag { animation: onboardDragLoop 1.6s ease-in-out infinite; }
        .hand-down { animation: onboardDownLoop 1.3s ease-in-out infinite; }
        .tap-ring {
            position: absolute;
            width: 42px;
            height: 42px;
            border: 1px solid rgba(255,255,255,0.42);
            border-radius: 999px;
            animation: tapPulse 1.25s ease-out infinite;
        }
        @keyframes onboardDragLoop {
            0%, 100% { transform: translateY(-8px); }
            50% { transform: translateY(8px); }
        }
        @keyframes onboardDownLoop {
            0% { transform: translateY(0); opacity: 0.7; }
            60% { transform: translateY(12px); opacity: 1; }
            100% { transform: translateY(0); opacity: 0.7; }
        }
        @keyframes tapPulse {
            0% { transform: scale(0.75); opacity: 0.7; }
            100% { transform: scale(1.45); opacity: 0; }
        }
        @keyframes handSwipeDown {
            0%, 100% { transform: translateY(0); }
            45% { transform: translateY(14px); }
            55% { transform: translateY(14px); }
        }

        .state-indicator {
            position: fixed; top: 30px; right: 30px; font-size: 10px;
            color: rgba(255, 255, 255, 0.2); z-index: 1000;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(4px); }
        }

        #finalFade {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            opacity: 0; pointer-events: none; transition: opacity 2.5s ease-in;
        }
        #finalFade.active { opacity: 1; pointer-events: all; }

        #blackoutOverlay {
            position: fixed; inset: 0; z-index: 8000; background: #000;
            opacity: 0; pointer-events: none; transition: opacity 2s ease-in;
        }
        #blackoutOverlay.dimming { opacity: 1; }

        .shake {
            animation: shake 0.4s linear infinite;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            50% { transform: translateX(2px); }
            75% { transform: translateX(-1px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>

            { type: 'ui', tone: 'tone-consensus',

            { type: 'text', tone: 'tone-consensus',

              html: '<p class="emphasis">Within one day, a second figure had fallen.</p>' },

            { type: 'text', tone: 'tone-strike',
              html: '<p class="emphasis"><span class="s27-line1">The nerves of an entire country</span><br><span class="s27-line2">tightened again.</span></p>' }
        ];

        var TOTAL = states.length;
        var currentIndex = -1;
        var isTransitioning = false;
        var autoTimer = null;
        var scrollCooldown = false;
        var blackoutLock = false;
        var firstHintTimer = null;
        var pendingS13AutoNext = false;
        var SWIPE_COOLDOWN_MS = 650;
        var onboardingStep = 0;
        var onboardingDone = false;
        var onboardingStep2ReadyAt = 0;
        var onboardingLastInputAt = 0;

        function showOnboardingStep1() {
            if (onboardingDone) return;
            var guide = document.getElementById('onboardingGuide');
            var s1 = document.getElementById('onboardStep1');
            var s2 = document.getElementById('onboardStep2');
            var title = document.getElementById('onboardTitle');
            guide.classList.add('visible');
            s1.classList.add('active');
            s2.classList.remove('active');
            title.style.opacity = '1';
            onboardingStep = 1;
        }

        function showOnboardingStep2() {
            if (onboardingDone || onboardingStep !== 1) return;
            var s1 = document.getElementById('onboardStep1');
            var s2 = document.getElementById('onboardStep2');
            var title = document.getElementById('onboardTitle');
            s1.classList.remove('active');
            s2.classList.add('active');
            title.style.opacity = '1';
            onboardingStep = 2;
            onboardingStep2ReadyAt = Date.now() + 320;
        }

        function hideOnboardingGuide() {
            var guide = document.getElementById('onboardingGuide');
            var s1 = document.getElementById('onboardStep1');
            var s2 = document.getElementById('onboardStep2');
            var title = document.getElementById('onboardTitle');
            guide.classList.remove('visible');
            s1.classList.remove('active');
            s2.classList.remove('active');
            title.style.opacity = '0';
            onboardingDone = true;
            onboardingStep = 0;
        }

        function updateFirstGestureHint(index) {
            var el = document.getElementById('firstGestureHint');
            if (!el) return;
            if (firstHintTimer) {
                clearTimeout(firstHintTimer);
                firstHintTimer = null;
            }
            if (index === 0 && states[index] && states[index].type === 'text') {
                el.classList.remove('visible');
                setTimeout(function() { el.classList.add('visible'); }, 900);
                firstHintTimer = setTimeout(function() {
                    el.classList.remove('visible');
                }, 10000);
            } else {
                el.classList.remove('visible');
            }
        }

        var interactiveIframes = {
            4:  'https://remi45848-source.github.io/rainshot-ep2/S4.html',
            5:  'https://remi45848-source.github.io/rainshot-ep2/S7.html',
            9:  'https://remi45848-source.github.io/rainshot-ep2/S11.html',
            10: 'https://remi45848-source.github.io/rainshot-ep2/S13.html',
            12: 'https://remi45848-source.github.io/rainshot-ep2/S17.html',
            15: 'https://remi45848-source.github.io/rainshot-ep2/S19.html',
            19: 'https://remi45848-source.github.io/rainshot-ep2/S22.html',
            22: 'https://remi45848-source.github.io/rainshot-ep2/S32.html',
            24: 'https://remi45848-source.github.io/rainshot-ep2/S34.html'
        };

        function buildStateElement(index, state) {
            var stateEl = document.createElement('div');
            stateEl.className = 'state';
            stateEl.setAttribute('data-index', index);

            var inner = '<div class="bg ' + state.tone + '"></div>';

            if (state.type === 'text') {
                inner += '<div class="text-content">' + state.html + '</div>';
            } else if (state.type === 'video') {
                if (state.src) {
                    inner += '<video class="story-video" playsinline webkit-playsinline preload="auto" src="' + state.src + '"></video>';
                } else {
                    inner += '<div class="video-placeholder-rect">' +
                             '<div class="video-placeholder-label">' + state.label + '</div>' +
                             '</div>';
                }
            } else if (state.type === 'ui-s20') {
                inner += '<div class="s20-audio-shell">' +
                         '<div class="s20-audio-card">' +
                         '<div class="s20-title">Night Ambience</div>' +
                         '<div class="s20-bars"><span></span><span></span><span></span><span></span><span></span></div>' +
                         '<div class="s20-sub">CITY NOISE LEVEL: LOW</div>' +
                         '</div>' +
                         '</div>';
            } else if (state.type === 'ui' || state.type === 'ui-s32') {
                if (interactiveIframes.hasOwnProperty(index)) {
                    inner += '<iframe class="story-iframe" data-src="' + interactiveIframes[index] + '" src="about:blank" title="story-ui"></iframe>';
                } else {
                    inner += '<div class="ui-placeholder-container">' +
                             '<div class="ui-placeholder-label">' + state.label + '</div>' +
                             '</div>';
                }
            } else if (state.type === 'audio' || state.type === 'audio-s30') {
                if (interactiveIframes.hasOwnProperty(index) && state.type === 'audio') {
                    inner += '<iframe class="story-iframe" data-src="' + interactiveIframes[index] + '" src="about:blank" title="story-ui"></iframe>';
                } else {
                    inner += '<div class="audio-placeholder-container">' +
                             '<div class="audio-bars' + (state.type === "audio-s30" ? " s30-bars" : "") + '">' +
                             '<div class="audio-bar"></div>' +
                             '<div class="audio-bar"></div>' +
                             '<div class="audio-bar"></div>' +
                             '<div class="audio-bar"></div>' +
                             '<div class="audio-bar"></div>' +
                             '</div>' +
                             '<div class="audio-placeholder-label">' + state.label + '</div>' +
                             '</div>';
                }
            }

            stateEl.innerHTML = inner;
            return stateEl;
        }

        function init() {
            var viewport = document.getElementById('viewport');
            for (var i = 0; i < TOTAL; i++) {
                viewport.appendChild(buildStateElement(i, states[i]));
            }

            // Password gate
            var accessInput = document.getElementById('accessInput');
            var accessGate = document.getElementById('accessGate');
            var accessError = document.getElementById('accessError');
            accessInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    if (accessInput.value.toLowerCase().trim() === 'flickfiction') {
                        accessGate.style.opacity = '0';
                        accessGate.style.transition = 'opacity 0.5s ease';
                        setTimeout(function() {
                            accessGate.style.display = 'none';
                            document.getElementById('startButton').style.display = 'inline-block';
                        }, 500);
                    } else {
                        accessInput.classList.add('error');
                        accessError.textContent = 'Invalid code';
                        setTimeout(function() { accessInput.classList.remove('error'); accessError.textContent = ''; }, 1500);
                    }
                }
            });

            document.getElementById('startButton').addEventListener('click', startExperience);
            document.getElementById('startButton').addEventListener('touchend', function(e) {
                e.preventDefault(); startExperience();
            });

            window.addEventListener('wheel', function(e) {
                if (scrollCooldown) return;
                if (currentIndex < 0) return;
                if (blackoutLock) return;
                if (currentIndex === 0) return;
                scrollCooldown = true;
                if (e.deltaY > 0) gotoState(currentIndex + 1);
                else if (e.deltaY < 0) gotoState(currentIndex - 1);
                setTimeout(function() { scrollCooldown = false; }, SWIPE_COOLDOWN_MS);
            }, { passive: true });

            var cornerTouchStartY = 0;
            var navCornerEl = document.getElementById('navCornerSwipe');
            navCornerEl.addEventListener('touchstart', function(e) {
                if (blackoutLock || currentIndex < 0) return;
                cornerTouchStartY = e.touches[0].clientY;
            }, { passive: true });
            navCornerEl.addEventListener('touchend', function(e) {
                if (blackoutLock || currentIndex < 0) return;
                if (scrollCooldown) return;
                var diff = cornerTouchStartY - e.changedTouches[0].clientY;
                if (Math.abs(diff) < 26) return;
                if (currentIndex === 0) {
                    if (onboardingStep !== 2) return;
                    scrollCooldown = true;
                    if (diff > 0) gotoState(1);
                    setTimeout(function() { scrollCooldown = false; }, SWIPE_COOLDOWN_MS);
                    return;
                }
                scrollCooldown = true;
                if (diff > 0) gotoState(currentIndex + 1);
                else gotoState(currentIndex - 1);
                setTimeout(function() { scrollCooldown = false; }, SWIPE_COOLDOWN_MS);
            }, { passive: true });

            var fullTouchStartY = 0;
            window.addEventListener('touchstart', function(e) {
                if (blackoutLock || currentIndex < 0) return;
                if (states[currentIndex].type !== 'text') return;
                if (currentIndex === TOTAL - 1) return;
                fullTouchStartY = e.touches[0].clientY;
            }, { passive: true });
            window.addEventListener('touchend', function(e) {
                if (blackoutLock || currentIndex < 0) return;
                if (states[currentIndex].type !== 'text') return;
                if (currentIndex === TOTAL - 1) return;
                if (scrollCooldown) return;
                if (currentIndex === 0) return;
                var diff = fullTouchStartY - e.changedTouches[0].clientY;
                if (Math.abs(diff) < 50) return;
                scrollCooldown = true;
                if (diff > 0) gotoState(currentIndex + 1);
                else gotoState(currentIndex - 1);
                setTimeout(function() { scrollCooldown = false; }, SWIPE_COOLDOWN_MS);
            }, { passive: true });

            function handleOnboardingTap() {
                if (currentIndex !== 0) return;
                var now = Date.now();
                if (now - onboardingLastInputAt < 220) return;
                onboardingLastInputAt = now;
                if (onboardingStep === 1) {
                    showOnboardingStep2();
                    return;
                }
                if (onboardingStep === 2 && !scrollCooldown) {
                    if (now < onboardingStep2ReadyAt) return;
                    scrollCooldown = true;
                    gotoState(1);
                    setTimeout(function() { scrollCooldown = false; }, 800);
                }
            }
            window.addEventListener('pointerdown', handleOnboardingTap, { passive: true });
            window.addEventListener('touchstart', handleOnboardingTap, { passive: true });
            window.addEventListener('click', handleOnboardingTap, { passive: true });

            window.addEventListener('keydown', function(e) {
                if (blackoutLock) return;
                if (currentIndex < 0) return;
                if (currentIndex === 0) return;
                if (e.key === 'Escape') {
                    var ae = document.activeElement;
                    if (ae && ae.tagName === 'IFRAME') {
                        ae.blur();
                        document.body.focus();
                    }
                    return;
                }
                if (e.key === 'ArrowDown' || e.key === ' ') {
                    if (e.key === ' ') e.preventDefault();
                    gotoState(currentIndex + 1);
                }
                if (e.key === 'ArrowUp') gotoState(currentIndex - 1);
            });

            window.addEventListener('message', function (event) {
                var data = event.data;
                if (!data || typeof data !== 'object') return;
                if (data.type !== 'S13_AUDIO_ENDED') return;
                if (!pendingS13AutoNext) return;
                pendingS13AutoNext = false;
                gotoState(currentIndex + 1);
            });
        }

        function focusStoryShell() {
            try {
                var ae = document.activeElement;
                if (ae && ae.tagName === 'IFRAME') ae.blur();
                window.focus();
                document.body.focus();
            } catch (err) {}
        }

        function shouldRestartIframe(index) {
            return index === 4 || index === 10 || index === 12 || index === 15 || index === 19 || index === 22 || index === 24;
        }

        function primeActiveIframe(index, activeEl) {
            if (!activeEl) return;
            var iframe = activeEl.querySelector('iframe.story-iframe');
            if (!iframe) return;
            var baseSrc = iframe.getAttribute('data-src');
            if (!baseSrc) return;
            if (shouldRestartIframe(index)) {
                iframe.src = baseSrc + (baseSrc.indexOf('?') > -1 ? '&' : '?') + 't=' + Date.now();
                return;
            }
            if (!iframe.src || iframe.src === 'about:blank') {
                iframe.src = baseSrc;
            }
        }

        function playBell(volume) {
            try {
                var bell = new Audio(alertBellUrl);
                bell.volume = typeof volume === 'number' ? volume : 0.9;
                bell.play().catch(function() {});
            } catch (e) {}
        }

        var preloadedVideoMap = {};
        function preloadUpcomingVideos(currentIndex) {
            var loaded = 0;
            for (var i = currentIndex + 1; i < TOTAL && loaded < 3; i++) {
                var st = states[i];
                if (!st || st.type !== 'video' || !st.src) continue;
                if (preloadedVideoMap[st.src]) continue;
                var v = document.createElement('video');
                v.preload = 'auto';
                v.src = st.src;
                try { v.load(); } catch (e) {}
                preloadedVideoMap[st.src] = true;
                loaded++;
            }
        }

        function startActiveVideo(index, activeEl) {
            if (!activeEl) return false;
            var video = activeEl.querySelector('video.story-video');
            if (!video) return false;
            try {
                video.pause();
                video.currentTime = 0;
                video.muted = (index === 17);
                video.autoplay = true;
                video.onended = function () {
                    if (currentIndex === index) gotoState(index + 1);
                };
                video.play().catch(function () {
                    setTimeout(function () {
                        if (currentIndex === index) gotoState(index + 1);
                    }, 7000);
                });
            } catch (err) {}
            return true;
        }

        var started = false;
        function startExperience() {
            if (started) return;
            started = true;
            document.getElementById('startOverlay').classList.add('hidden');
            try {
                ambientAudio.play().catch(function() {});
            } catch (e) {}
            setTimeout(function() { gotoState(0); }, 300);
        }

        function gotoState(index) {
            if (!started || index < 0 || index >= TOTAL) { return; }
            if (blackoutLock) return;
            if (states[index] && states[index].type === 'audio-s30') {
                gotoState(index + 1);
                return;
            }
            if (isTransitioning && index !== currentIndex) return;
            isTransitioning = true;

            if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }

            var hint = document.getElementById('navHint');
            hint.classList.remove('visible');

            var allStates = document.querySelectorAll('.state');
            for (var s = 0; s < allStates.length; s++) {
                allStates[s].classList.remove('active');
            }

            var activeEl = document.querySelector('[data-index="' + index + '"]');
            activeEl.classList.add('active');
            if (index !== 0) hideOnboardingGuide();
            primeActiveIframe(index, activeEl);
            if (index === 9) {
                var s9Frame = activeEl.querySelector('iframe.story-iframe');
                if (s9Frame) {
                    s9Frame.classList.remove('s9-fade-in');
                    setTimeout(function () { s9Frame.classList.add('s9-fade-in'); }, 20);
                }
                var oldHint9 = activeEl.querySelector('.s9-scroll-hint');
                if (oldHint9) oldHint9.remove();
                var scrollHint9 = document.createElement('div');
                scrollHint9.className = 's9-scroll-hint';
                scrollHint9.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg><span>scroll</span>';
                activeEl.appendChild(scrollHint9);
            }
            var activeText = activeEl.querySelector('.text-content');
            if (activeText) activeText.classList.remove('s31-fade-in');
            if (activeText) activeText.classList.remove('s21-delayed-fade');
            if (activeText) activeText.classList.remove('s20-dim-after');
            var animSpans = activeEl.querySelectorAll('.anim');
            for (var a = 0; a < animSpans.length; a++) animSpans[a].classList.remove('anim');
            var activeVideoEl = activeEl.querySelector('video.story-video');
            if (activeVideoEl) activeVideoEl.classList.remove('s11-delayed-fade');
            if (index === 11 && activeVideoEl) {
                setTimeout(function () { activeVideoEl.classList.add('s11-delayed-fade'); }, 20);
            }

            currentIndex = index;
            preloadUpcomingVideos(index);
            var displayNumber = (index + 1);
            document.getElementById('stateIndicator').innerText =
                (displayNumber < 10 ? '0' : '') + displayNumber + ' / ' + TOTAL;

            var state = states[index];
            updateFirstGestureHint(index);
            pendingS13AutoNext = false;

            if (state.type === 'onboarding') {
                showOnboardingStep1();
                setTimeout(function() { isTransitioning = false; }, 250);
                return;
            }

            if (state.type === 'text') {
                if (index === 20 && activeText) {
                    var l1 = activeText.querySelector('.s20-line1');
                    var l2 = activeText.querySelector('.s20-line2');
                    var l3 = activeText.querySelector('.s20-line3');
                    if (l1) { l1.classList.remove('anim'); void l1.offsetWidth; l1.classList.add('anim'); }
                    if (l2) { l2.classList.remove('anim'); void l2.offsetWidth; l2.classList.add('anim'); }
                    if (l3) { l3.classList.remove('anim'); void l3.offsetWidth; l3.classList.add('anim'); }
                    activeText.classList.add('s20-dim-after');
                    autoTimer = setTimeout(function() {
                        if (currentIndex === 20) gotoState(21);
                    }, 6400);
                }
                if (index === 21 && activeText) {
                    activeText.classList.add('s21-delayed-fade');
                }
                if (index === TOTAL - 1) {
                    var a1 = activeText.querySelector('.s27-line1');
                    var a2 = activeText.querySelector('.s27-line2');
                    if (a1) { a1.classList.remove('anim'); void a1.offsetWidth; a1.classList.add('anim'); }
                    if (a2) { a2.classList.remove('anim'); void a2.offsetWidth; a2.classList.add('anim'); }
                    setTimeout(function() {
                        document.getElementById('finalFade').classList.add('active');
                        var fadeSteps = 20;
                        var step = 0;
                        var fadeTimer = setInterval(function() {
                            step++;
                            ambientAudio.volume = Math.max(0, 0.135 * (1 - step / fadeSteps));
                            if (step >= fadeSteps) {
                                clearInterval(fadeTimer);
                                ambientAudio.pause();
                            }
                        }, 100);
                    }, 4500);
                } else {
                    setTimeout(function() { hint.classList.add('visible'); }, 1200);
                }
                setTimeout(function() { isTransitioning = false; }, 800);
                return;
            }

            if (state.type === 'video') {
                setTimeout(function() { isTransitioning = false; }, 800);
                if (index === 11) {
                    setTimeout(function () {
                        if (currentIndex === 11) startActiveVideo(index, activeEl);
                    }, 2000);
                    return;
                }
                if (index === 17) {
                    startActiveVideo(index, activeEl);
                    var s17bgAudio = new Audio('https://pub-0f8fb9a88fd749b0987b026db4672ab5.r2.dev/town_cross_roads2.mp3');
                    s17bgAudio.volume = 0.15;
                    s17bgAudio.loop = true;
                    s17bgAudio.play().catch(function(){});
                    var origOnEnded = activeEl.querySelector('video.story-video').onended;
                    activeEl.querySelector('video.story-video').onended = function () {
                        s17bgAudio.pause();
                        s17bgAudio.src = '';
                        if (origOnEnded) origOnEnded();
                    };
                    return;
                }
                if (!startActiveVideo(index, activeEl)) {
                    autoTimer = setTimeout(function() {
                        gotoState(index + 1);
                    }, 7000);
                }
                return;
            }

            if (state.type === 'audio') {
                if (index === 10) {
                    playBell(0.9);
                }
                pendingS13AutoNext = true;
                setTimeout(function() { hint.classList.add('visible'); }, 1200);
                setTimeout(function() { isTransitioning = false; }, 800);
                setTimeout(focusStoryShell, 200);
                return;
            }

            if (state.type === 'ui') {
                if (index === 4) playBell(0.9);
                setTimeout(function() { hint.classList.add('visible'); }, 1200);
                setTimeout(function() { isTransitioning = false; }, 800);
                setTimeout(focusStoryShell, 200);
                return;
            }

            if (state.type === 'audio-s30') {
                blackoutLock = true;
                var barsContainer = activeEl.querySelector('.audio-bars');
                if (barsContainer) {
                    barsContainer.classList.add('s30-anim');
                }
                setTimeout(function() {
                    document.getElementById('blackoutOverlay').classList.add('dimming');
                }, 2000);
                setTimeout(function() {
                    document.getElementById('blackoutOverlay').classList.remove('dimming');
                    blackoutLock = false;
                    gotoState(index + 1);
                }, 3500);
                setTimeout(function() { isTransitioning = false; }, 800);
                return;
            }

            if (state.type === 'ui-s32') {
                playBell(0.9);
                var labelEl = activeEl.querySelector('.ui-placeholder-label');
                var iframeEl = activeEl.querySelector('iframe');
                try {
                    if (navigator.vibrate) {
                        navigator.vibrate(400);
                    } else if (labelEl) {
                        labelEl.classList.add('shake');
                    } else if (iframeEl) {
                        iframeEl.classList.add('shake');
                    }
                } catch (e) {
                    if (labelEl) {
                        labelEl.classList.add('shake');
                    } else if (iframeEl) {
                        iframeEl.classList.add('shake');
                    }
                }
                setTimeout(function() { isTransitioning = false; }, 800);
                autoTimer = setTimeout(function() {
                    gotoState(index + 1);
                }, 1500);
                return;
            }

            setTimeout(function() { isTransitioning = false; }, 800);
        }

        init();
    </script>
</body>
</html>

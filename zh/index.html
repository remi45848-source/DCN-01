<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rainshot — Episode 2 · Who Killed the Daltons?</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: #0a0a0a; color: #e8e8e8; font-weight: 300;
    }
    body:focus { outline: none; }

    #startOverlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.98);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10000; opacity: 1;
      transition: opacity 0.8s ease;
    }
    #startOverlay.hidden { opacity: 0; pointer-events: none; }
    #startButton {
      padding: 20px 50px; font-size: 1.3em; font-family: 'Cormorant Garamond', serif; font-weight: 300;
      letter-spacing: 3px; background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; cursor: pointer;
      border-radius: 2px; transition: all 0.4s ease; display: none;
    }
    #startButton:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }
    .access-gate { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .access-label { font-size: 0.85em; letter-spacing: 3px; color: rgba(255,255,255,0.35); text-transform: uppercase; }
    .access-input {
      width: 240px; padding: 14px 20px; font-size: 1.1em; font-family: 'Cormorant Garamond', serif;
      font-weight: 300; letter-spacing: 2px; text-align: center;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; border-radius: 2px; outline: none; transition: all 0.4s ease;
    }
    .access-input::placeholder { color: rgba(255,255,255,0.2); }
    .access-input:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); }
    .access-input.error { border-color: rgba(200,60,60,0.6); animation: accessShake 0.4s ease; }
    .access-error { font-size: 0.8em; color: rgba(200,60,60,0.7); letter-spacing: 2px; height: 1em; }
    @keyframes accessShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .viewport { position: fixed; inset: 0; }
    .state {
      position: absolute; inset: 0;
      min-height: 100%;
      min-height: -webkit-fill-available;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .state.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .tone-rain-open   { background: #09090e; }
    .tone-information { background: #08080d; }
    .tone-opinion     { background: #0a0a0c; }
    .tone-official    { background: #080c10; }
    .tone-consensus   { background: #0c0a08; }
    .tone-dissolve    { background: #0b0b0a; }
    .tone-midnight    { background: #060608; }
    .tone-strike      { background: #040404; }

    .text {
      width: min(90vw, 900px);
      text-align: center;
      line-height: 2.4;
      letter-spacing: 0.04em;
      font-size: clamp(18px, 2.2vw, 28px);
      padding: 40px;
    }
    .text p { margin: 10px 0; }
    .emphasis { color: #fff; font-weight: 500; }

    .text.s31-fade-in { animation: s31FadeIn 4s ease forwards; }
    @keyframes s31FadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .video-shell, .ui-shell {
      position: absolute;
      inset: 0;
      background: #000;
    }

    video.story-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }
    video.story-video.s13-delayed-fade {
      opacity: 0;
      animation: s13DelayedFade 0.6s ease 2s forwards;
    }
    @keyframes s13DelayedFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    iframe.story-iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      border: 0;
      display: block;
      background: #000;
    }
    iframe.story-iframe.s9-fade-in {
      animation: s9FadeIn 1.1s ease both;
    }
    @keyframes s9FadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.15);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      padding: 20px;
    }

    .state-indicator {
      position: fixed;
      right: 30px;
      top: 30px;
      z-index: 1000;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
    }

    .nav-hint {
      position: fixed;
      right: 14px;
      bottom: 24px;
      font-size: 18px;
      color: rgba(255,255,255,0.35);
      z-index: 1700;
      opacity: 0;
      transition: opacity 0.6s ease;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 0.6;
      pointer-events: none;
    }
    .nav-hint.visible { opacity: 1; }
    .nav-hint .arrow { display: inline-block; animation: bounce 2s ease infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }

    #blackoutOverlay {
      position: fixed; inset: 0; z-index: 8000; background: #000;
      opacity: 0; pointer-events: none;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #blackoutOverlay.dimming { opacity: 1; }

    #finalFade {
      position: fixed; inset: 0; z-index: 9999; background: #000;
      opacity: 0; pointer-events: none;
      transition: opacity 2.5s ease-in;
    }
    #finalFade.active { opacity: 1; pointer-events: all; }
  </style>
</head>
<body tabindex="-1">
  <div id="startOverlay">
    <div class="access-gate" id="accessGate">
      <div class="access-label">Access Code</div>
      <input class="access-input" id="accessInput" type="password" placeholder="enter code" autocomplete="off" spellcheck="false">
      <div class="access-error" id="accessError"></div>
    </div>
    <button id="startButton">ENTER STORY</button>
  </div>

  <div class="viewport" id="viewport"></div>
  <div id="blackoutOverlay"></div>
  <div id="finalFade"></div>
  <div class="state-indicator" id="stateIndicator"></div>
  <div class="nav-hint" id="navHint"><span class="arrow">&#709;</span><span class="arrow" style="animation-delay:0.15s">&#709;</span></div>

  <script>
    var states = [
      /* S1 */
      { type: 'ui', tone: 'tone-information', label: '[ VIDEO — TikTok feed storm ]' },
      /* S2 */
      { type: 'text', tone: 'tone-information', html: '<p>The reaction was nationwide.</p><p>Media saturation. News domination.</p><p class="emphasis">Who did it?</p>' },
      /* S3 */
      { type: 'video', tone: 'tone-opinion', label: '[ VIDEO — conservative television interview ]', src: 'https://pub-c060596a842c46ac8aac8eefd7e96cf7.r2.dev/fox.mp4' },
      /* S3.5 */
      { type: 'text', tone: 'tone-opinion', html: '<p>A quieter question moved beneath the footage.</p><p class="emphasis">Who benefits?</p><p>The Daltons had spent years making enemies.</p><p>One name kept surfacing—President James Carter.</p>' },
      /* S4A */
      { type: 'text', tone: 'tone-opinion', html: '<p>The internet began digging into the past.</p><p>Old interviews. Archived footage. Legislative battles.</p>' },
      /* S4B */
      { type: 'text', tone: 'tone-opinion', html: '<p>Every conflict between Carter and Dalton was reinterpreted.</p><p>People began building a case.</p>' },
      /* S5 */
      { type: 'video', tone: 'tone-official', label: '[ VIDEO — alternative news network ]', src: 'https://pub-c060596a842c46ac8aac8eefd7e96cf7.r2.dev/CNN.mp4' },
      /* S5.5 */
      { type: 'text', tone: 'tone-official', html: '<p>At the same time, competing suspects also emerge.</p><p>Extremists.</p><p>Foreign actors.</p><p>Political rivals.</p>' },
      /* S6 */
      { type: 'text', tone: 'tone-consensus', html: '<p>Millions attempted to solve the mystery.</p><p>Relationship charts. Timelines. Evidence threads.</p>' },
      /* S7 */
      { type: 'video', tone: 'tone-official', label: '[ VIDEO — President Carter confronted by reporters ]', src: 'https://pub-c060596a842c46ac8aac8eefd7e96cf7.r2.dev/%E6%80%BB%E7%BB%9F%E4%B8%8B%E8%BD%A6.mp4' },
      /* S8 */
      { type: 'video', tone: 'tone-consensus', label: '[ VIDEO — silence clip spreads ]', src: 'https://pub-c060596a842c46ac8aac8eefd7e96cf7.r2.dev/GIF.mp4', delayedFade: true },
      /* S8.5 */
      { type: 'text', tone: 'tone-consensus', html: '<p>At first, only a handful of people shared the clip.</p><p>Then thousands. Then millions.</p><p>The President\'s three seconds of silence were being replayed across the entire country.</p>' },
      /* S10.5 */
      { type: 'ui', tone: 'tone-consensus', label: '[ UI — pick a side ]' },
      /* S11A */
      { type: 'text', tone: 'tone-dissolve', html: '<p>A famous investigative journalist released a teaser.</p><p>Claims to possess evidence.</p>' },
      /* S11B */
      { type: 'text', tone: 'tone-dissolve', html: '<p>A 10 PM livestream was announced.</p><p>The story exploded again.</p>' },
      /* S12 */
      { type: 'video', tone: 'tone-official', label: '[ VIDEO — President office · Find him ]', src: 'https://pub-c060596a842c46ac8aac8eefd7e96cf7.r2.dev/%E6%80%BB%E7%BB%9F%E5%8A%9E%E5%85%AC%E5%AE%A4.mp4' },
      /* S13 */
      { type: 'text', tone: 'tone-dissolve', html: '<p>National press conference scheduled.</p><p>9:00 AM.</p><p>Newsrooms prepare.</p>' },
      /* S14 */
      { type: 'text', tone: 'tone-dissolve', html: '<p>The arguments intensified.</p><p>Every rumor found believers.</p><p>Every theory found evidence.</p>' },
      /* S15A */
      { type: 'text', tone: 'tone-midnight', html: '<p>After midnight, even outrage grows tired.</p>' },
      /* S15B */
      { type: 'text', tone: 'tone-midnight', html: '<p>The nation waits for morning.</p>' },
      /* blackout */
      { type: 'blackout', tone: 'tone-strike' },
      /* S16 */
      { type: 'video', tone: 'tone-strike', label: '[ VIDEO — hotel corridor ]', src: 'https://pub-c060596a842c46ac8aac8eefd7e96cf7.r2.dev/%E4%B8%AD%E6%9E%AA.mp4' },
      /* blackout */
      { type: 'blackout', tone: 'tone-strike' },
      /* S17 alert */
      { type: 'ui', tone: 'tone-strike', label: '[ UI — alert ]', autoNextMs: 2000 },
      /* S17.5 breaking */
      { type: 'ui', tone: 'tone-strike', label: '[ UI — breaking sequence ]' },
      /* S18 */
      { type: 'text', tone: 'tone-strike', html: '<p>If Carter ordered the killings,</p><p class="emphasis">why kill his own son?</p>' },
      /* S19 */
      { type: 'text', tone: 'tone-strike', html: '<p class="emphasis">What is on the note?</p>' },
      /* S20 */
      { type: 'text', tone: 'tone-strike', html: '<p>Then who are we looking for?</p>' },
      /* S21 */
      { type: 'text', tone: 'tone-strike', html: '<p class="emphasis" style="font-size: clamp(30px, 8vw, 64px); letter-spacing: 0.22em; color:#9e2222;">WHO ARE THEY?</p>', final: true }
    ];

    var interactiveIframes = {
      0: 'https://remi45848-source.github.io/EP2NEW/S1.html',
      12: 'https://remi45848-source.github.io/EP2NEW/S10.html',
      23: 'https://remi45848-source.github.io/EP2NEW/S19.html',
      24: 'https://remi45848-source.github.io/EP2NEW/S20.html'
    };

    var restartIframeIndices = { 0: true, 12: true, 23: true, 24: true };
    var TOTAL = states.length;
    var currentIndex = -1;
    var experienceStarted = false;
    var isTransitioning = false;
    var scrollCooldown = false;
    var autoTimer = null;
    var SWIPE_COOLDOWN_MS = 650;
    var preloadedVideoMap = {};
    var preloadedDocMap = {};
    var videoPlayTimer = null;

    var ambientAudio = new Audio('https://files.catbox.moe/jn29tb.mp3');
    ambientAudio.loop = true;
    var AMBIENT_BASE_VOLUME = 0.135;
    ambientAudio.volume = AMBIENT_BASE_VOLUME;
    var ambientStarted = false;

    var alertBellUrl = 'https://pub-0f8fb9a88fd749b0987b026db4672ab5.r2.dev/iPhone%E7%9F%AD%E4%BF%A1%E9%93%83%E5%A3%B0_%E7%88%B1%E7%BB%99%E7%BD%91_aigei_com.mp3';

    function playBell(volume) {
      if (!alertBellUrl) return;
      try {
        var bell = new Audio(alertBellUrl);
        bell.volume = typeof volume === 'number' ? volume : 0.9;
        bell.play().catch(function () {});
      } catch (e) {}
    }

    function startAmbient() {
      if (ambientStarted) return;
      ambientStarted = true;
      try {
        ambientAudio.volume = AMBIENT_BASE_VOLUME;
        ambientAudio.play().catch(function () {});
      } catch (e) {}
    }

    function fadeAmbientOut() {
      if (!ambientStarted) return;
      var steps = 20;
      var step = 0;
      var fadeTimer = setInterval(function () {
        step++;
        ambientAudio.volume = Math.max(0, AMBIENT_BASE_VOLUME * (1 - step / steps));
        if (step >= steps) {
          clearInterval(fadeTimer);
          try { ambientAudio.pause(); } catch (e) {}
        }
      }, 100);
    }

    function startExperience() {
      if (experienceStarted) return;
      experienceStarted = true;
      document.getElementById('startOverlay').classList.add('hidden');
      startAmbient();
      setTimeout(function () { gotoState(0); }, 300);
    }

    function buildState(index, st) {
      var el = document.createElement('div');
      el.className = 'state ' + st.tone;
      el.dataset.index = index;

      if (st.type === 'text' || st.type === 'blackout') {
        el.innerHTML = '<div class="text">' + (st.html || '') + '</div>';
      } else if (st.type === 'video') {
        if (st.src) {
          el.innerHTML = '<div class="video-shell"><video class="story-video" playsinline webkit-playsinline preload="metadata" data-src="' + st.src + '"></video></div>';
        } else {
          el.innerHTML = '<div class="video-shell"><div class="placeholder">' + (st.label || '[ VIDEO ]') + '</div></div>';
        }
      } else if (st.type === 'ui' || st.type === 'ui-s32') {
        if (interactiveIframes.hasOwnProperty(index)) {
          el.innerHTML = '<div class="ui-shell"><iframe class="story-iframe" src="about:blank" data-src="' + interactiveIframes[index] + '" title="story-ui" allow="autoplay *"></iframe></div>';
        } else {
          el.innerHTML = '<div class="ui-shell"><div class="placeholder">' + (st.label || '[ UI ]') + '</div></div>';
        }
      }
      return el;
    }

    function hardStopVideo(video) {
      if (!video) return;
      try {
        video.pause();
        video.muted = true;
        video.onended = null;
      } catch (e) {}
    }

    function stopAllStoryMedia(nextIndex) {
      if (videoPlayTimer) {
        clearTimeout(videoPlayTimer);
        videoPlayTimer = null;
      }

      var allVideos = document.querySelectorAll('video.story-video');
      for (var i = 0; i < allVideos.length; i++) {
        hardStopVideo(allVideos[i]);
      }

      var iframes = document.querySelectorAll('iframe.story-iframe');
      for (var j = 0; j < iframes.length; j++) {
        try {
          if (iframes[j].contentWindow) {
            iframes[j].contentWindow.postMessage({ type: 'EP2_PAUSE' }, '*');
          }
        } catch (e) {}
      }

      var states = document.querySelectorAll('.state');
      for (var s = 0; s < states.length; s++) {
        var stateIdx = parseInt(states[s].getAttribute('data-index'), 10);
        if (stateIdx === nextIndex) continue;
        var frame = states[s].querySelector('iframe.story-iframe');
        if (frame && frame.src && frame.src !== 'about:blank') {
          frame.src = 'about:blank';
        }
      }
    }

    function ensureVideoSrc(video) {
      if (!video || video.src) return;
      var src = video.getAttribute('data-src');
      if (src) video.src = src;
    }

    function preloadVideoUrl(url) {
      if (!url || preloadedVideoMap[url]) return;
      preloadedVideoMap[url] = true;
      var v = document.createElement('video');
      v.preload = 'auto';
      v.src = url;
      try { v.load(); } catch (e) {}
    }

    function preloadUpcomingVideos(fromIndex) {
      var loaded = 0;
      for (var i = fromIndex + 1; i < TOTAL && loaded < 3; i++) {
        var st = states[i];
        if (!st || st.type !== 'video' || !st.src) continue;
        preloadVideoUrl(st.src);
        var el = document.querySelector('[data-index="' + i + '"] video.story-video');
        if (el) {
          ensureVideoSrc(el);
          try { el.preload = 'auto'; el.load(); } catch (e) {}
        }
        loaded++;
      }
    }

    function prefetchDocument(url) {
      if (!url || preloadedDocMap[url]) return;
      preloadedDocMap[url] = true;
      try {
        var l = document.createElement('link');
        l.rel = 'prefetch';
        l.as = 'document';
        l.href = url;
        document.head.appendChild(l);
      } catch (e) {}
    }

    function resolveIframeSrc(index, baseSrc) {
      if (!baseSrc) return baseSrc;
      var sep = baseSrc.indexOf('?') > -1 ? '&' : '?';
      if (index === 12) return baseSrc + sep + 'mode=pick';
      return baseSrc;
    }

    function primeIframe(index, el, forceRestart) {
      var frame = el.querySelector('iframe.story-iframe');
      if (!frame) return;
      var baseSrc = frame.getAttribute('data-src');
      if (!baseSrc) return;
      var src = resolveIframeSrc(index, baseSrc);
      frame.classList.remove('s9-fade-in');
      void frame.offsetWidth;
      frame.classList.add('s9-fade-in');
      if (forceRestart || restartIframeIndices[index]) {
        frame.src = src + (src.indexOf('?') > -1 ? '&' : '?') + 't=' + Date.now();
      } else if (!frame.src || frame.src === 'about:blank') {
        frame.src = src;
      }
    }

    function startActiveVideo(index, activeEl, st) {
      var video = activeEl.querySelector('video.story-video');
      if (!video) return false;
      ensureVideoSrc(video);
      try {
        video.pause();
        video.currentTime = 0;
        video.muted = false;
        video.playsInline = true;
        video.classList.remove('s13-delayed-fade');
        if (st && st.delayedFade) video.classList.add('s13-delayed-fade');

        video.onended = function () {
          if (currentIndex === index) gotoState(index + 1);
        };

        var playNow = function () {
          videoPlayTimer = null;
          if (currentIndex !== index) return;
          video.muted = false;
          video.play().catch(function () {
            autoTimer = setTimeout(function () {
              if (currentIndex === index) gotoState(index + 1);
            }, 7000);
          });
        };

        if (st && st.delayedFade) {
          videoPlayTimer = setTimeout(playNow, 2000);
        } else {
          videoPlayTimer = setTimeout(playNow, 350);
        }
      } catch (e) {}
      return true;
    }

    function gotoState(index) {
      if (!experienceStarted) return;
      if (index < 0 || index >= TOTAL) return;
      if (isTransitioning && index !== currentIndex) return;

      isTransitioning = true;
      if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
      stopAllStoryMedia(index);

      var hint = document.getElementById('navHint');
      hint.classList.remove('visible');

      var prev = document.querySelector('.state.active');
      if (prev) prev.classList.remove('active');

      var next = document.querySelector('.state[data-index="' + index + '"]');
      if (!next) { isTransitioning = false; return; }
      next.classList.add('active');
      currentIndex = index;

      document.getElementById('stateIndicator').textContent =
        String(index + 1).padStart(2, '0') + ' / ' + TOTAL;

      var st = states[index];
      var textEl = next.querySelector('.text');
      if (textEl) {
        textEl.classList.remove('s31-fade-in');
        void textEl.offsetWidth;
        if (st.type === 'text' && st.html) textEl.classList.add('s31-fade-in');
      }

      preloadUpcomingVideos(index);
      if (interactiveIframes[0]) prefetchDocument(interactiveIframes[0]);

      document.getElementById('blackoutOverlay').classList.remove('dimming');

      if (st.type === 'blackout') {
        document.getElementById('blackoutOverlay').classList.add('dimming');
        setTimeout(function () { hint.classList.add('visible'); }, 1200);
        setTimeout(function () { isTransitioning = false; }, 800);
        return;
      }

      if (st.type === 'video') {
        if (!startActiveVideo(index, next, st)) {
          autoTimer = setTimeout(function () {
            if (currentIndex === index) gotoState(index + 1);
          }, 4000);
        }
        setTimeout(function () { isTransitioning = false; }, 800);
        return;
      }

      if (st.type === 'ui' || st.type === 'ui-s32') {
        primeIframe(index, next, true);
        if (index === 23) playBell(0.9);
        setTimeout(function () { hint.classList.add('visible'); }, 1200);
        if (typeof st.autoNextMs === 'number') {
          autoTimer = setTimeout(function () {
            if (currentIndex === index) gotoState(index + 1);
          }, st.autoNextMs);
        }
        setTimeout(function () { isTransitioning = false; }, 800);
        return;
      }

      if (st.type === 'text') {
        if (st.final) {
          setTimeout(function () {
            if (currentIndex === index) {
              document.getElementById('finalFade').classList.add('active');
              fadeAmbientOut();
            }
          }, 5200);
        } else {
          setTimeout(function () { hint.classList.add('visible'); }, 1200);
        }
        setTimeout(function () { isTransitioning = false; }, 800);
        return;
      }

      setTimeout(function () { isTransitioning = false; }, 800);
    }

    (function init() {
      var viewport = document.getElementById('viewport');
      for (var i = 0; i < TOTAL; i++) {
        viewport.appendChild(buildState(i, states[i]));
      }

      /* 预加载 S1 + S3 视频 */
      prefetchDocument(interactiveIframes[0]);
      preloadVideoUrl(states[2].src);

      var accessInput = document.getElementById('accessInput');
      var accessGate = document.getElementById('accessGate');
      var accessError = document.getElementById('accessError');
      accessInput.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter') return;
        if (accessInput.value.toLowerCase().trim() === 'flickfiction') {
          accessGate.style.opacity = '0';
          accessGate.style.transition = 'opacity 0.5s ease';
          setTimeout(function () {
            accessGate.style.display = 'none';
            document.getElementById('startButton').style.display = 'inline-block';
          }, 500);
        } else {
          accessInput.classList.add('error');
          accessError.textContent = 'Invalid code';
          setTimeout(function () {
            accessInput.classList.remove('error');
            accessError.textContent = '';
          }, 1500);
        }
      });

      document.getElementById('startButton').addEventListener('click', startExperience);
      document.getElementById('startButton').addEventListener('touchend', function (e) {
        e.preventDefault();
        startExperience();
      });

      window.addEventListener('message', function (event) {
        var data = event.data;
        if (!data || typeof data !== 'object') return;
        if (data.type === 'EP2_S3_FEED_DONE' && currentIndex === 0) {
          gotoState(1);
        }
        /* S10.5：消息发送后 4s 自动进入 S11A */
        if (data.type === 'EP2_S10_DONE' && currentIndex === 12) {
          if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
          autoTimer = setTimeout(function () {
            if (currentIndex === 12) gotoState(13);
          }, 4000);
        }
        if (data.type === 'EP2_BREAKING_DONE' && currentIndex === 24) {
          gotoState(25);
        }
      });

      window.addEventListener('wheel', function (e) {
        if (!experienceStarted) return;
        if (scrollCooldown || isTransitioning) return;
        scrollCooldown = true;
        if (e.deltaY > 0) gotoState(currentIndex + 1);
        else if (e.deltaY < 0) gotoState(currentIndex - 1);
        setTimeout(function () { scrollCooldown = false; }, SWIPE_COOLDOWN_MS);
      }, { passive: true });

      var touchStartY = 0;
      window.addEventListener('touchstart', function (e) {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      window.addEventListener('touchend', function (e) {
        if (!experienceStarted) return;
        if (scrollCooldown || isTransitioning) return;
        var diff = touchStartY - e.changedTouches[0].clientY;
        if (Math.abs(diff) < 50) return;
        scrollCooldown = true;
        if (diff > 0) gotoState(currentIndex + 1);
        else gotoState(currentIndex - 1);
        setTimeout(function () { scrollCooldown = false; }, SWIPE_COOLDOWN_MS);
      }, { passive: true });

      window.addEventListener('keydown', function (e) {
        if (!experienceStarted) return;
        if (isTransitioning) return;
        if (e.key === 'ArrowDown' || e.key === ' ') {
          if (e.key === ' ') e.preventDefault();
          gotoState(currentIndex + 1);
        }
        if (e.key === 'ArrowUp') gotoState(currentIndex - 1);
      });
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>权力的陨落 — 第一章</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Noto Serif SC', 'Cormorant Garamond', 'STSong', serif; background: #0a0a0a; color: #e8e8e8; font-weight: 300; }

        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; opacity: 1; transition: opacity 0.8s ease;
        }
        #startOverlay.hidden { opacity: 0; pointer-events: none; }
        #startButton {
            padding: 20px 50px; font-size: 1.3em; font-family: 'Noto Serif SC', 'Cormorant Garamond', serif; font-weight: 300;
            letter-spacing: 3px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; cursor: pointer;
            border-radius: 2px; transition: all 0.4s ease; display: none;
        }
        #startButton:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }
        .access-gate { display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .access-label { font-size: 0.85em; letter-spacing: 3px; color: rgba(255,255,255,0.35); }
        .access-input {
            width: 240px; padding: 14px 20px; font-size: 1.1em; font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
            font-weight: 300; letter-spacing: 2px; text-align: center;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; border-radius: 2px; outline: none; transition: all 0.4s ease;
        }
        .access-input::placeholder { color: rgba(255,255,255,0.2); }
        .access-input:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); }
        .access-input.error { border-color: rgba(200,60,60,0.6); animation: shake 0.4s ease; }
        .access-error { font-size: 0.8em; color: rgba(200,60,60,0.7); letter-spacing: 2px; height: 1em; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

        .video-loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1);
            border-top-color: rgba(255,255,255,0.5); border-radius: 50%;
            animation: spin 0.8s linear infinite; z-index: 2;
            transition: opacity 0.3s ease;
        }
        .video-loader.hidden { opacity: 0; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        .viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        .state {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; visibility: hidden;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }
        .state.active { opacity: 1; visibility: visible; pointer-events: auto; }
        .state.fade-out { opacity: 0; transition: opacity 1.1s ease-out; }
        .state.fade-in-slow { animation: fadeInSlow 1.2s ease-in forwards; }
        @keyframes fadeInSlow { from { opacity: 0; } to { opacity: 1; } }

        .bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .text-content {
            font-size: 1.35em; line-height: 2.4; letter-spacing: 0.04em;
            text-align: center; max-width: 85%; padding: 40px;
        }
        .text-content .emphasis { font-weight: 500; color: #fff; }

        .video-container { width: 100%; height: 100%; background: #000; overflow: hidden; position: relative; }
        .video-container video { width: 100%; height: 100%; object-fit: contain; }

        .image-frame { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; overflow: hidden; }
        .image-frame img { max-width: 80%; max-height: 75%; object-fit: contain; box-shadow: 0 30px 90px rgba(0,0,0,0.8); transform: scale(1); transform-origin: center center; }
        .state.active .image-frame img { animation: slowZoom 4s ease-out forwards; }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(2); } }

        .interactive-frame { width: 100%; height: 100%; border: none; }

        .tone-execution { background: #08080c; }
        .tone-gunfire { background: #160808; }
        .tone-silence { background: #0a0a0f; }
        .tone-memory-warm { background: #141424; }
        .tone-celebration { background: #1a1a1c; }
        .tone-revelation { background: #0c0c14; }
        .tone-archive { background: #141010; }
        .tone-power-before { background: #160c0c; }
        .tone-aftermath { background: #08080d; }
        .tone-crime-scene { background: #0d0808; }
        .tone-investigation { background: #080d12; }
        .tone-dawn { background: #12121c; }

        .nav-hint {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            font-size: 18px; color: rgba(255, 255, 255, 0.35); z-index: 1000;
            opacity: 0; transition: opacity 0.6s ease;
            display: flex; flex-direction: column; align-items: center; line-height: 0.6;
        }
        .nav-hint.visible { opacity: 1; }
        .nav-hint .arrow { display: inline-block; animation: bounce 2s ease infinite; }
        .state-indicator {
            position: fixed; top: 30px; right: 30px; font-size: 10px;
            color: rgba(255, 255, 255, 0.2); z-index: 1000;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(4px); } }

        #finalFade {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            opacity: 0; pointer-events: none; transition: opacity 2.5s ease-in;
        }
        #finalFade.active { opacity: 1; pointer-events: all; }

    <script>
        var R2 = 'https://pub-5e8a0ef5a4644a828651643ce245e258.r2.dev';
        var states = [
            { type: 'video', tone: 'tone-execution',     src: R2 + '/raw-6.mp4' },
            { type: 'text',  tone: 'tone-silence',       text: '<p>没有人喊叫。</p><p class="emphasis">唯余那些尚未来得及理解自身死亡的人们，投来一道道茫然而困惑的目光\u2014\u2014仿佛在问，这一切，是真的吗。</p>' },
            { type: 'text',  tone: 'tone-memory-warm',   text: '<p class="emphasis">三个小时以前。</p><p>烛火在水晶杯壁上微微发颤。香槟吐出一串串金色的细泡，像是替人间最后的欢愉，轻声叹了口气。</p>' },
            { type: 'video', tone: 'tone-celebration',    src: R2 + '/lv_0_20260107152558.mp4' },
            { type: 'text',  tone: 'tone-revelation',    text: '<p>而这泼天的富贵\u2014\u2014</p><p class="emphasis">究竟建筑在怎样的根基之上？</p>' },
            { type: 'text',  tone: 'tone-power-before',  text: '<p class="emphasis">道尔顿家族。一个政治贵族的王朝。</p><p>祖父，盘踞参议院数十载，以立法之手雕刻国运的资深议员。母亲，则一路攀升至副总统之位。</p><p>在这片土地上，没有一扇门敢对他们的姓氏紧闭。</p>' },
            { type: 'interactive', tone: 'tone-archive' },
            { type: 'text',  tone: 'tone-power-before',  text: '<p>每一次丑闻，每一场风暴，他们都安然无恙。</p><p class="emphasis">一张由无数人情债务织就的庞大而无形之网，将他们牢牢护在风眼的中心。</p>' },
            { type: 'text',  tone: 'tone-power-before',  text: '<p>数十亿赈灾款项，凭空蒸发，不留丝毫痕迹。</p><p>无数条生命的鲜血，碾碎在他们逍遥法外的铁蹄之下。</p><p class="emphasis">可他们依旧自由地行走于阳光之下，未受分毫追究。</p>' },
            { type: 'text',  tone: 'tone-power-before',  text: '<p>但是今天\u2014\u2014</p><p class="emphasis">这命运的天平，是否终将倾覆？</p>' },
            { type: 'video', tone: 'tone-gunfire',       src: R2 + '/lv_0_20260109225800.mp4' },
            { type: 'text',  tone: 'tone-execution',     text: '<p>三十分钟。</p><p class="emphasis">四十七条人命。</p>' },
            { type: 'video', tone: 'tone-crime-scene',   src: R2 + '/raw-3.mp4' },
            { type: 'text',  tone: 'tone-aftermath',     text: '<p>铁锈与火药的气味弥漫在空气中，浓稠得近乎窒息。</p><p>那是死亡尚未散尽的余温。</p>' },
            { type: 'text',  tone: 'tone-aftermath',     text: '<p class="emphasis">整个世界，都屏住了呼吸。</p>' },
            { type: 'text',  tone: 'tone-revelation',    text: '<p>从此，</p><p class="emphasis">一切都将不同。</p>' },
            { type: 'text',  tone: 'tone-aftermath',     text: '<p class="emphasis">一小时后。</p>' },
            { type: 'video', tone: 'tone-investigation', src: R2 + '/lv_0_20260107152639.mp4' },
            { type: 'text',  tone: 'tone-investigation', text: '<p>国家机器轰然启动。每一股力量、每一个权力机关，都不约而同地朝向同一个问题倾斜\u2014\u2014</p><p class="emphasis">是谁干的？</p>' },
            { type: 'text',  tone: 'tone-dawn',          text: '<p>没有监控录像。没有目击证人。</p><p class="emphasis">没有作案动机。什么都没有。</p>' },
            { type: 'video', tone: 'tone-investigation', src: R2 + '/raw-10.mp4' },
            { type: 'text',  tone: 'tone-investigation', text: '<p class="emphasis">雨，没有停。</p>' },
            { type: 'text',  tone: 'execution',          text: '<p>人的性命，</p><p class="emphasis">不过是脚下被踩烂的野草，无人问津。</p>' },
            { type: 'text',  tone: 'execution',          text: '<p>而这，</p><p class="emphasis">只是开始。</p>' }
        ];

        var INTERACTIVE_INDEX = 6;
        var currentIndex = -1;
        var isTransitioning = false;
        var videoElements = {};
        var ambientAudio = document.getElementById('globalAmbient');
        var isWeChat = /MicroMessenger/i.test(navigator.userAgent);
        var interactiveComplete = false;

        window.addEventListener('message', function(e) {
            if (e.data === 'interactive-complete') {
                interactiveComplete = true;
                var iframe = document.getElementById('interactive_' + INTERACTIVE_INDEX);
                if (iframe) iframe.style.pointerEvents = 'none';
                setTimeout(function() {
                    gotoState(INTERACTIVE_INDEX + 1);
                }, 400);
            }
        });

        function init() {
            var viewport = document.getElementById('viewport');
            for (var i = 0; i < states.length; i++) {
                var state = states[i];
                var stateEl = document.createElement('div');
                stateEl.className = 'state';
                stateEl.setAttribute('data-index', i);
                var inner = '<div class="bg ' + state.tone + '"></div>';
                if (state.type === 'text') {
                    inner += '<div class="text-content">' + state.text + '</div>';
                } else if (state.type === 'video') {
                    inner += '<div class="video-container">' +
                        '<div class="video-loader" id="loader_' + i + '"></div>' +
                        '<video id="vid_' + i + '"' +
                        ' playsinline webkit-playsinline' +
                        ' x5-playsinline="true"' +
                        ' x5-video-orientation="portrait"' +
                        ' muted preload="auto"></video>' +
                        '</div>';
                } else if (state.type === 'image') {
                    inner += '<div class="image-frame"><img src="' + state.imageUrl + '" loading="lazy"></div>';
                } else if (state.type === 'interactive') {
                    inner += '<iframe class="interactive-frame" id="interactive_' + i + '" allowfullscreen></iframe>';
                }
                stateEl.innerHTML = inner;
                viewport.appendChild(stateEl);
                if (state.type === 'video') { videoElements[i] = document.getElementById('vid_' + i); }
            }
            document.getElementById('startButton').addEventListener('click', startExperience);
            document.getElementById('startButton').addEventListener('touchend', function(e) { e.preventDefault(); startExperience(); });

            var accessInput = document.getElementById('accessInput');
            var accessError = document.getElementById('accessError');
            var accessGate = document.getElementById('accessGate');
            accessInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    if (accessInput.value.toLowerCase().trim() === 'flickfiction') {
                        accessGate.style.opacity = '0';
                        accessGate.style.transition = 'opacity 0.5s ease';
                        setTimeout(function() {
                            accessGate.style.display = 'none';
                            document.getElementById('startButton').style.display = '';
                        }, 500);
                    } else {
                        accessInput.classList.add('error');
                        accessError.textContent = '密码错误';
                        setTimeout(function() { accessInput.classList.remove('error'); accessError.textContent = ''; }, 1500);
                    }
                }
            });
        }

        function preloadAround(index) {
            var range = [index - 1, index, index + 1, index + 2];
            for (var r = 0; r < range.length; r++) {
                var i = range[r];
                if (i < 0 || i >= states.length) continue;
                if (states[i].type !== 'video') continue;
                var vid = videoElements[i];
                if (!vid.getAttribute('src')) { vid.setAttribute('src', states[i].src); vid.load(); }
            }
        }

        function safePlay(vid, callback) {
            vid.muted = true;
            var playPromise = vid.play();
            if (playPromise !== undefined) {
                playPromise.then(function() {
                    vid.muted = false;
                    if (callback) callback();
                }).catch(function() {
                    var resolved = false;
                    var timeout = setTimeout(function() { if (!resolved) { resolved = true; if (callback) callback(); } }, 8000);
                    vid.addEventListener('canplay', function onCanPlay() {
                        vid.removeEventListener('canplay', onCanPlay);
                        if (resolved) return;
                        clearTimeout(timeout); resolved = true;
                        vid.muted = true;
                        var retry = vid.play();
                        if (retry !== undefined) { retry.then(function() { vid.muted = false; }).catch(function() {}); }
                        if (callback) callback();
                    });
                });
            } else { if (callback) callback(); }
        }

        var started = false;
        var firstVidPreplayed = false;
        function startExperience() {
            if (started) return;
            started = true;
            try { ambientAudio.play(); ambientAudio.volume = 0.3; } catch(e) {}
            var firstVid = videoElements[0];
            if (firstVid) {
                firstVid.setAttribute('src', states[0].src);
                firstVid.load();
                firstVid.muted = true;
                var p = firstVid.play();
                if (p !== undefined) { p.then(function() { firstVidPreplayed = true; }).catch(function(e) {}); }
            }
            preloadAround(0);
            document.getElementById('startOverlay').classList.add('hidden');
            setTimeout(function() { gotoState(0); }, 300);
        }

        function setupVideoEnd(vid, stateEl, index) {
            if (index === 20) {
                var checkTime = setInterval(function() {
                    if (vid.duration && vid.currentTime >= vid.duration - 2) {
                        clearInterval(checkTime);
                        stateEl.style.transition = 'opacity 2s ease-out';
                        stateEl.classList.add('fade-out');
                    }
                }, 100);
                vid.onended = function() {
                    clearInterval(checkTime);
                    stateEl.style.transition = '';
                    stateEl.classList.remove('fade-out');
                    if (index < states.length - 1) gotoState(index + 1);
                };
            } else {
                vid.onended = function() {
                    if (index < states.length - 1) {
                        stateEl.style.transition = 'opacity 1.1s ease-out';
                        stateEl.classList.add('fade-out');
                        setTimeout(function() {
                            stateEl.style.transition = '';
                            stateEl.classList.remove('fade-out');
                            gotoState(index + 1);
                        }, 1100);
                    }
                };
            }
        }

        function gotoState(index) {
            if (index < 0 || index >= states.length || isTransitioning) return;
            if (currentIndex === INTERACTIVE_INDEX && index > INTERACTIVE_INDEX && !interactiveComplete) return;
            isTransitioning = true;
            var prevState = currentIndex >= 0 ? states[currentIndex] : null;
            var nextState = states[index];
            if (prevState && prevState.type === 'video' && videoElements[currentIndex]) { videoElements[currentIndex].pause(); }
            var allStates = document.querySelectorAll('.state');
            for (var s = 0; s < allStates.length; s++) { allStates[s].classList.remove('active'); allStates[s].classList.remove('fade-in-slow'); }
            var activeEl = document.querySelector('[data-index="' + index + '"]');
            activeEl.classList.add('active');
            if (index === 20) { activeEl.classList.add('fade-in-slow'); }
            preloadAround(index);

            if (nextState.type === 'video') {
                if (index === 3) { fadeAmbient(0); } else { fadeAmbient(0.3); }
                var vid = videoElements[index];
                var loader = document.getElementById('loader_' + index);
                var stateEl = activeEl;
                vid.onended = null;
                if (!vid.getAttribute('src')) { vid.setAttribute('src', nextState.src); vid.load(); }
                if (loader) loader.classList.remove('hidden');
                if (index === 0 && firstVidPreplayed) {
                    firstVidPreplayed = false;
                    vid.muted = false;
                    if (loader) loader.classList.add('hidden');
                    setupVideoEnd(vid, stateEl, index);
                } else {
                    vid.currentTime = 0;
                    safePlay(vid, function() {
                        if (loader) loader.classList.add('hidden');
                        setupVideoEnd(vid, stateEl, index);
                    });
                }
            } else if (nextState.type === 'interactive') {
                fadeAmbient(0.15);
                var iframe = document.getElementById('interactive_' + index);
                if (iframe && !iframe.srcdoc) {
                    iframe.srcdoc = INTERACTIVE_HTML;

            }

            currentIndex = index;
            document.getElementById('stateIndicator').innerText = (index < 10 ? '0' : '') + index + ' / ' + (states.length - 1);

            var hint = document.getElementById('navHint');
            if (nextState.type === 'video' || nextState.type === 'interactive') {
                hint.classList.remove('visible');
            } else if (index === states.length - 1) {
                hint.classList.remove('visible');
                setTimeout(function() {
                    document.getElementById('finalFade').classList.add('active');
                    setTimeout(function() {
                        var startVol = ambientAudio.volume;
                        var step = startVol / 40;
                        clearInterval(window.fadeInterval);
                        window.fadeInterval = setInterval(function() {
                            var cur = ambientAudio.volume;
                            if (cur <= step) { ambientAudio.volume = 0; ambientAudio.pause(); clearInterval(window.fadeInterval); }
                            else { ambientAudio.volume = cur - step; }
                        }, 50);
                    }, 2500);
                }, 2000);
            } else {
                setTimeout(function() { hint.classList.add('visible'); }, 1200);
            }

            setTimeout(function() { isTransitioning = false; }, 800);
        }

        function fadeAmbient(target) {
            clearInterval(window.fadeInterval);
            window.fadeInterval = setInterval(function() {
                var current = ambientAudio.volume;
                if (Math.abs(current - target) < 0.02) { ambientAudio.volume = target; clearInterval(window.fadeInterval); }
                else { ambientAudio.volume += (target > current ? 0.02 : -0.02); }
            }, 50);
        }

        var scrollCooldown = false;
        window.addEventListener('wheel', function(e) {
            if (scrollCooldown) return; scrollCooldown = true;
            if (e.deltaY > 0) gotoState(currentIndex + 1);
            else if (e.deltaY < 0) gotoState(currentIndex - 1);
            setTimeout(function() { scrollCooldown = false; }, 1200);
        }, { passive: true });

        var touchStartY = 0;
        window.addEventListener('touchstart', function(e) { touchStartY = e.touches[0].clientY; }, { passive: true });
        window.addEventListener('touchend', function(e) {
            var diff = touchStartY - e.changedTouches[0].clientY;
            if (Math.abs(diff) > 50) { if (diff > 0) gotoState(currentIndex + 1); else gotoState(currentIndex - 1); }
        }, { passive: true });

        window.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowDown' || e.key === ' ') gotoState(currentIndex + 1);
            if (e.key === 'ArrowUp') gotoState(currentIndex - 1);
        });

        if (isWeChat) {
            document.addEventListener('WeixinJSBridgeReady', function() {
                WeixinJSBridge.invoke('getNetworkType', {}, function() {
                    ambientAudio.load();
                    if (videoElements[0]) { videoElements[0].setAttribute('src', states[0].src); videoElements[0].load(); }
                });
            }, false);
        }

        init();
    </script>
</body>
</html>

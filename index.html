<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Fall of the Powerful</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; -webkit-font-smoothing: antialiased; }
        body {
            background: #0a0a0a; color: #e8e8e8;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Cormorant Garamond', 'Noto Serif SC', serif; font-weight: 300;
        }
        .title-en {
            font-size: clamp(1.4em, 4vw, 2.8em); letter-spacing: 0.12em; font-weight: 300;
            color: rgba(255,255,255,0.85); margin-bottom: 6px; text-align: center;
        }
        .title-zh {
            font-family: 'Noto Serif SC', serif; font-size: clamp(0.9em, 2.2vw, 1.4em);
            letter-spacing: 0.3em; font-weight: 300; color: rgba(255,255,255,0.35);
            margin-bottom: clamp(40px, 8vh, 80px); text-align: center;
        }
        .divider {
            width: 40px; height: 1px; background: rgba(255,255,255,0.15);
            margin-bottom: clamp(40px, 8vh, 80px);
        }
        .choices { display: flex; gap: clamp(24px, 6vw, 60px); }
        .choice {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            text-decoration: none; padding: 24px 40px; border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2px; transition: all 0.5s ease; cursor: pointer; background: transparent;
        }
        .choice:hover {
            border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.03);
            transform: translateY(-2px);
        }
        .choice-label {
            font-size: clamp(1.1em, 2.5vw, 1.6em); letter-spacing: 0.15em;
            color: rgba(255,255,255,0.8); font-weight: 300; transition: color 0.4s;
        }
        .choice:hover .choice-label { color: #fff; }
        .choice-sub {
            font-size: clamp(0.65em, 1.2vw, 0.8em); letter-spacing: 0.2em;
            color: rgba(255,255,255,0.25); text-transform: uppercase;
        }
        .choice-zh .choice-label { font-family: 'Noto Serif SC', serif; letter-spacing: 0.3em; }
        .footer {
            position: fixed; bottom: clamp(20px, 4vh, 40px);
            font-size: 0.7em; letter-spacing: 0.15em; color: rgba(255,255,255,0.12);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .title-en { animation: fadeIn 1.2s ease both; }
        .title-zh { animation: fadeIn 1.2s ease 0.2s both; }
        .divider { animation: fadeIn 1s ease 0.5s both; }
        .choices { animation: fadeIn 1s ease 0.8s both; }
        .footer { animation: fadeIn 1s ease 1.2s both; }
    </style>
</head>
<body>
    <div class="title-en">The Fall of the Powerful</div>
    <div class="title-zh">权力的陨落</div>
    <div class="divider"></div>
    <div class="choices">
        <a class="choice choice-en" href="en/">
            <span class="choice-label">English</span>
            <span class="choice-sub">Episode One</span>
        </a>
        <a class="choice choice-zh" href="zh/">
            <span class="choice-label">中文</span>
            <span class="choice-sub">第一章</span>
        </a>
    </div>
    <div class="footer">AN INTERACTIVE NARRATIVE EXPERIENCE</div>
</body>
</html>
